name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zola
        run: |
          curl -sSL https://github.com/getzola/zola/releases/download/v0.19.2/zola-v0.19.2-x86_64-unknown-linux-gnu.tar.gz \
            | sudo tar -xz -C /usr/local/bin
          zola --version

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: analytics/requirements.txt

      - name: Install analytics dependencies
        run: pip install -r analytics/requirements.txt

      - name: Regenerate charts
        run: python analytics/scripts/build_all.py

      - name: Configure base URL for GitHub Pages
        run: |
          # Detecta automáticamente la URL del Pages site
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          OWNER="${GITHUB_REPOSITORY%%/*}"
          # Si el repo se llama OWNER.github.io es root, si no, usa /REPO_NAME/
          if [[ "$REPO_NAME" == "${OWNER}.github.io" ]]; then
            BASE_URL="https://${OWNER}.github.io"
          else
            BASE_URL="https://${OWNER}.github.io/${REPO_NAME}"
          fi
          echo "Using base_url=$BASE_URL"
          sed -i "s|^base_url = .*|base_url = \"$BASE_URL\"|" config.toml

      - name: Build site
        run: zola build --output-dir public

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
